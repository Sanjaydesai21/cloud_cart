# Allow Frontend -> Backend

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      tier: backend

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: frontend

      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 3003
        - protocol: TCP
          port: 3004

---
# Allow Frontend Egress -> Backend

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      tier: frontend

  policyTypes:
    - Egress

  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: backend

      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 3003
        - protocol: TCP
          port: 3004

---
# Allow Backend -> MySQL

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-mysql
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      app: mysql

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend

      ports:
        - protocol: TCP
          port: 3306

---
# Allow Backend Egress -> MySQL

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress-mysql
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      tier: backend

  policyTypes:
    - Egress

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mysql

      ports:
        - protocol: TCP
          port: 3306